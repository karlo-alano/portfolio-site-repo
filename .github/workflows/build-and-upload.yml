name: Build and Upload

on:
  push:
    branches: 
      - main

jobs:
  build:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Setup node
          uses: actions/setup-node@v4
          with:
            node-version: 20

        - name: Install dependencies
          uses: npm install

        - name: Build site
          uses: npm run build

        - name: Upload to Github Artifacts
          uses: actions/upload-artifact@v4
          with:
            name: dist
            path: dist/
